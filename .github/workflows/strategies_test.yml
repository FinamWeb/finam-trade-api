name: Python strategy tests

on:
  push:
    branches: ["main"]
    paths:
      - "strategies/**"
      - "python/**"
      - "proto/**"
      - ".github/workflows/strategies_test.yml"
  pull_request:
    paths:
      - "strategies/**"
      - "python/**"
      - "proto/**"
      - ".github/workflows/strategies_test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install SDK and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./python[dev]"

      - name: Run strategy tests
        run: python -m pytest strategies/sma_crossover/tests

      - name: Lint strategy
        run: |
          python -m ruff check strategies
          python -m ruff format --check strategies

      - name: Type-check strategy
        if: matrix.python-version == '3.13'
        run: python -m mypy --config-file strategies/pyproject.toml strategies/sma_crossover
